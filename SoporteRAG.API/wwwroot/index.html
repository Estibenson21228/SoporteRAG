<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Soporte RAG</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #f4f6f8;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 10px #ccc;
        }

        h1 {
            color: #1f2937;
        }

        textarea, input {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
        }

        button {
            margin-top: 10px;
            padding: 10px 16px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

            button:hover {
                background: #1d4ed8;
            }

        .respuesta, .fuente {
            background: #f9fafb;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border-left: 4px solid #2563eb;
        }

        .fuente {
            border-left-color: #16a34a;
        }

        .error {
            color: red;
            margin-top: 10px;
        }

        pre {
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Asistente de Soporte TI - RAG</h1>

        <h2>1. Cargar documento</h2>
        <input type="file" id="fileInput" accept=".pdf,.txt,.docx">
        <button onclick="uploadFile()">Subir archivo</button>
        <div id="uploadResult"></div>

        <hr />

        <h2>2. Importar tickets CSV</h2>
        <input type="file" id="csvInput" accept=".csv">
        <button onclick="uploadCsv()">Subir CSV</button>
        <div id="csvResult"></div>

        <hr>

        <h2>3. Hacer pregunta</h2>
        <textarea id="question" rows="4" placeholder="Ejemplo: El servicio no responde desde el servidor principal"></textarea>
        <button onclick="askQuestion()">Preguntar</button>

        <div id="result"></div>
    </div>

    <script>
    const API_BASE = "https://localhost:7055";

    async function uploadFile() {
        const fileInput = document.getElementById("fileInput");
        const resultDiv = document.getElementById("uploadResult");

        if (!fileInput.files.length) {
            resultDiv.innerHTML = "<p class='error'>Seleccione un archivo.</p>";
            return;
        }

        const file = fileInput.files[0];
        const allowed = [".pdf", ".txt", ".docx"];
        const extension = file.name.substring(file.name.lastIndexOf(".")).toLowerCase();

        if (!allowed.includes(extension)) {
            resultDiv.innerHTML = "<p class='error'>Solo se permiten archivos PDF, TXT y DOCX.</p>";
            return;
        }

        const formData = new FormData();
        formData.append("file", file);

        resultDiv.innerHTML = "Subiendo archivo...";

        try {
            const response = await fetch(`${API_BASE}/api/documents/cargar`, {
                method: "POST",
                body: formData
            });

            const text = await response.text();

            if (!response.ok) {
                resultDiv.innerHTML = `<p class='error'>Error: ${text}</p>`;
                return;
            }

            resultDiv.innerHTML = `<p>Archivo procesado correctamente.</p>`;
        } catch (error) {
            resultDiv.innerHTML = `<p class='error'>Error al subir archivo: ${error}</p>`;
        }
        }


        async function uploadCsv() {
            const csvInput = document.getElementById("csvInput");
            const resultDiv = document.getElementById("csvResult");

            if (!csvInput.files.length) {
                resultDiv.innerHTML = "<p class='error'>Seleccione un archivo CSV.</p>";
                return;
            }

            const file = csvInput.files[0];
            const extension = file.name.substring(file.name.lastIndexOf(".")).toLowerCase();

            if (extension !== ".csv") {
                resultDiv.innerHTML = "<p class='error'>Solo se permiten archivos CSV.</p>";
                return;
            }

            const formData = new FormData();
            formData.append("file", file);

            resultDiv.innerHTML = "Importando CSV...";

            try {
                const response = await fetch(`${API_BASE}/api/tickets/import/csv`, {
                    method: "POST",
                    body: formData
                });

                const rawText = await response.text();

                let data = null;

                try {
                    data = rawText ? JSON.parse(rawText) : null;
                } catch {
                    resultDiv.innerHTML = `
                <p class='error'>La API no devolvió JSON válido:</p>
                <pre>${rawText}</pre>
            `;
                    return;
                }

                if (!response.ok) {
                    resultDiv.innerHTML = `
                <p class='error'>Error al importar CSV:</p>
                <pre>${JSON.stringify(data, null, 2)}</pre>
            `;
                    return;
                }

                resultDiv.innerHTML = `
            <div class="respuesta">
                <p><strong>${data.message}</strong></p>
                <p>Tickets importados: ${data.ticketsImportados}</p>
            </div>
        `;
            } catch (error) {
                resultDiv.innerHTML = `<p class='error'>Error al subir CSV: ${error.message}</p>`;
            }
        }


        async function askQuestion() {
            const question = document.getElementById("question").value;
            const resultDiv = document.getElementById("result");

            if (!question.trim()) {
                resultDiv.innerHTML = "<p class='error'>Ingrese una pregunta.</p>";
                return;
            }

            resultDiv.innerHTML = "Consultando...";

            try {
                const response = await fetch(`${API_BASE}/api/Rag/preguntar`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ question })
                });

                const rawText = await response.text();

                if (!rawText) {
                    resultDiv.innerHTML = "<p class='error'>La API respondió vacío.</p>";
                    return;
                }

                let data;

                try {
                    data = JSON.parse(rawText);
                } catch {
                    resultDiv.innerHTML = `
                <p class='error'>La API no devolvió JSON válido:</p>
                <pre>${rawText}</pre>
            `;
                    return;
                }

                if (!response.ok) {
                    resultDiv.innerHTML = `
                <p class='error'>Error de la API:</p>
                <pre>${JSON.stringify(data, null, 2)}</pre>
            `;
                    return;
                }

                let html = `
            <div class="respuesta">
                <h3>Respuesta</h3>
                <p>${data.respuesta}</p>
                <p><strong>Confianza:</strong> ${data.confianza ?? "No especificada"}</p>
            </div>
            <h3>Top 3 fuentes utilizadas</h3>
        `;

                if (data.fuentes && data.fuentes.length > 0) {
                    data.fuentes.slice(0, 3).forEach((f, index) => {
                        html += `
                    <div class="fuente">
                        <h4>Fuente ${index + 1}</h4>
                        <p><strong>Tipo:</strong> ${f.tipoFuente}</p>
                        <p><strong>Identificador:</strong> ${f.identificador}</p>
                        <p><strong>Score:</strong> ${Number(f.score).toFixed(4)}</p>
                        <pre>${f.fragmento}</pre>
                    </div>
                `;
                    });
                } else {
                    html += "<p>No se encontraron fuentes.</p>";
                }

                resultDiv.innerHTML = html;

            } catch (error) {
                resultDiv.innerHTML = `<p class='error'>Error al consultar: ${error.message}</p>`;
            }
        }





    </script>
</body>
</html>
